[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests/test_*.py test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -q
    --strict-markers
markers =
    django_db: marks test as requiring database
    tenant_db: marks test as requiring full django-tenants setup (skipped in unit runs)
